<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABY Inventory — Category Management</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    --bg:#F3F5F9;--panel:#ffffff;--panel2:#F5F7FB;--ink:#1B2536;--muted:#6A788D;--line:#E7EBF1;
    --primary:#3FABC6;--primaryd:#2B8EA6;--primarysoft:#E4F4F8;--brand:#DE37A3;--cyan:#2CB8DE;--green:#15A24A;--greensoft:#E6F6EC;
    --amber:#D88A0C;--ambersoft:#FDF3E0;--orange:#F97316;--orangesoft:#FEEEE2;--red:#E04848;--redsoft:#FDECEC;
    --shadow:0 1px 2px rgba(16,30,54,.04),0 6px 18px rgba(16,30,54,.06);
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  body.dark{--bg:#0E1521;--panel:#151E2C;--panel2:#1B2533;--ink:#E7ECF4;--muted:#93A1B5;--line:#27313F;
    --primary:#45B6D0;--primaryd:#64C6DA;--primarysoft:#10333D;--brand:#E94FB4;--cyan:#3FD0EC;--green:#34C26A;--greensoft:#13301F;
    --amber:#E0A53B;--ambersoft:#2E2613;--orange:#F98B4B;--orangesoft:#2E1E14;--red:#F0686A;--redsoft:#2E1719;
    --shadow:0 1px 2px rgba(0,0,0,.4)}
  input,select,button,textarea{font-family:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes shimmer{0%{background-position:-450px 0}100%{background-position:450px 0}}
  .shell{display:flex;min-height:100vh;width:100%;position:relative}

  /* ---- SIDEBAR ---- */
  .sidebar{width:264px;flex:none;background:var(--panel);border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;transition:width .22s ease}
  .sidebar.collapsed{width:80px}
  .logoRow{display:flex;align-items:center;gap:11px;padding:6px 6px 16px}
  .sidebar.collapsed .logoRow{justify-content:center;padding:6px 0 16px}
  .sidebar.collapsed .logoText,.sidebar.collapsed .installText{display:none}
  .nav{display:flex;flex-direction:column;gap:3px;overflow-y:auto;overflow-x:hidden;flex:1;margin:6px -4px 0;padding:6px 4px}
  .navItem{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer}
  .navItem:hover{background:var(--primarysoft);color:var(--primary)}
  .navItem.active{color:var(--primary);background:var(--primarysoft);font-weight:700;box-shadow:inset 3px 0 0 var(--primary)}
  .sidebar.collapsed .navItem{justify-content:center;padding:12px;gap:0}
  .sidebar.collapsed .navItem.active{box-shadow:none}
  .sidebar.collapsed .navLabel{display:none}
  .installCard{margin-top:10px;background:var(--primarysoft);border-radius:12px;padding:13px;display:flex;align-items:center;gap:11px}
  .sidebar.collapsed .installCard{justify-content:center;padding:11px}

  /* mobile sidebar */
  body.mobile .sidebar{position:fixed;top:0;left:0;height:100vh;width:276px;z-index:56;transform:translateX(-100%);transition:transform .26s cubic-bezier(.32,.72,.3,1)}
  body.mobile .sidebar.open{transform:translateX(0);box-shadow:0 0 60px rgba(16,30,54,.2)}
  body.mobile .sidebar.collapsed{width:276px}
  body.mobile .sidebar.collapsed .navLabel,body.mobile .sidebar.collapsed .logoText,body.mobile .sidebar.collapsed .installText{display:block}
  body.mobile .sidebar.collapsed .navItem{justify-content:flex-start;padding:11px 13px;gap:12px}
  #backdrop{display:none;position:fixed;inset:0;background:rgba(12,20,33,.45);z-index:55}
  body.mobile #backdrop.show{display:block}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{height:64px;flex:none;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 18px;position:sticky;top:0;z-index:40}
  .iconBtn{width:40px;height:40px;border:1px solid var(--line);background:var(--panel);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);flex:none}
  .iconBtn:hover{background:var(--primarysoft);color:var(--primary)}
  .menuBtn{color:var(--ink)}
  .menuBtn:hover{border-color:var(--primarysoft)}
  .headerSearch{display:flex;align-items:center;gap:9px;height:40px;padding:0 12px;border:1px solid var(--line);background:var(--panel2);border-radius:9px;width:320px;max-width:34vw}
  .headerSearch input{border:none;background:transparent;outline:none;font-size:13px;color:var(--ink);width:100%}
  .langBtn{width:auto;gap:6px;padding:0 11px}
  body.narrow .headerSearch{display:none}
  body.narrow .langWrap{display:none}
  body.mobile .fsBtn{display:none}
  body.narrow .profileText{display:none}
  .profileChip{display:flex;align-items:center;gap:9px;padding:4px 10px 4px 4px;border:1px solid var(--line);border-radius:24px;margin-left:4px;cursor:pointer}
  .profileChip:hover{border-color:var(--primary)}
  .menuPop{position:absolute;z-index:45;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 14px 40px rgba(16,30,54,.18);padding:6px}
  .menuItem{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink)}
  .menuItem:hover{background:var(--panel2)}

  .content{padding:22px;flex:1;display:flex;flex-direction:column;gap:16px;min-width:0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}
  .btnImport{display:flex;align-items:center;gap:7px;height:40px;padding:0 15px;background:var(--greensoft);color:var(--green);border:1px solid var(--line);border-radius:8px;font-size:13.5px;font-weight:700;cursor:pointer}
  .btnExport{display:flex;align-items:center;gap:7px;height:40px;padding:0 15px;background:var(--ambersoft);color:var(--amber);border:1px solid var(--line);border-radius:8px;font-size:13.5px;font-weight:700;cursor:pointer}
  .btnAdd{display:flex;align-items:center;gap:7px;height:40px;padding:0 16px;background:linear-gradient(135deg,var(--primary),var(--primaryd));color:#fff;border:none;border-radius:8px;font-size:13.5px;font-weight:700;cursor:pointer;box-shadow:0 6px 15px rgba(63,171,198,.3);white-space:nowrap}
  .viewBtn{width:34px;height:34px;border-radius:7px;border:none;background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .viewBtn.on{background:var(--panel);color:var(--primary);box-shadow:0 1px 3px rgba(16,30,54,.12)}
  .fInput{height:40px;border:1px solid var(--line);background:var(--panel2);border-radius:8px;padding:0 12px;font-size:13px;outline:none;color:var(--ink)}
  .rowBtn{border:1px solid var(--line);background:var(--panel);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted)}
  .rowBtn.del{border-color:var(--redsoft);color:var(--red)}
  .chkbox{width:19px;height:19px;border-radius:5px;border:1.6px solid var(--line);background:var(--panel);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
  .chkbox.on{border:none;background:var(--primary)}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:6px;font-size:11.5px;font-weight:700}
  .pill.active{background:var(--greensoft);color:var(--green)}
  .pill.inactive{background:var(--panel2);color:var(--muted)}
  .pdot{width:6px;height:6px;border-radius:50%}
  .sortable{cursor:pointer;display:flex;align-items:center;gap:4px}
  .pageBtn{min-width:34px;height:34px;padding:0 8px;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:7px;font-size:13px;font-weight:700;cursor:pointer}
  .pageBtn.on{border-color:var(--primary);background:var(--primary);color:#fff}
  .navArrow{width:34px;height:34px;border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .navArrow.disabled{color:var(--line);cursor:default}
  .bulkBtn{display:flex;align-items:center;gap:6px;height:32px;padding:0 12px;border:1px solid var(--line);background:var(--panel);border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer}
  .overlay{position:fixed;inset:0;background:rgba(12,20,33,.5);z-index:70;display:flex;align-items:center;justify-content:center;padding:20px}
  .swatch{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2.5px solid transparent}
  .seg{flex:1;height:40px;display:flex;align-items:center;justify-content:center;gap:7px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-weight:600}
  .seg.on{border:1.5px solid var(--green);background:var(--greensoft);color:var(--green);font-weight:700}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);z-index:90;display:flex;align-items:center;gap:11px;padding:13px 18px;border-radius:10px;background:#16233a;color:#fff;box-shadow:0 14px 40px rgba(16,30,54,.34);max-width:90vw;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast span{font-size:13.5px;font-weight:600}
</style>
</head>
<body>
<div class="shell">
  <div id="backdrop"></div>

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="logoRow">
      <svg width="34" height="38" viewBox="0 0 44 50" fill="none" style="flex:none"><polygon points="22,5 9,12.5 9,27.5 22,35 35,27.5 35,12.5" stroke="url(#sbLogo)" stroke-width="3.6" stroke-linejoin="round"/><rect x="17" y="15.5" width="10" height="10" rx="2.6" fill="var(--brand)"/><path d="M11 40 Q22 49 33 40" stroke="var(--brand)" stroke-width="3.6" stroke-linecap="round" fill="none"/><defs><linearGradient id="sbLogo" x1="9" y1="5" x2="35" y2="35"><stop stop-color="var(--cyan)"/><stop offset="1" stop-color="var(--primaryd)"/></linearGradient></defs></svg>
      <div class="logoText">
        <div style="font-size:16px;font-weight:800;letter-spacing:.4px;color:var(--ink);line-height:1.1">ABY<span style="color:var(--muted);font-weight:600"> INVENTORY</span></div>
        <div style="font-size:10.5px;color:var(--muted);font-weight:500">Employee Dashboard</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="installCard">
      <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primaryd));display:flex;align-items:center;justify-content:center;flex:none"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 19h14" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="installText"><div style="font-size:12.5px;font-weight:700">Install Aby Inventory</div><div style="font-size:11px;color:var(--muted)">Quick access from home screen</div></div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="main">
    <header class="topbar">
      <button class="iconBtn menuBtn" data-action="menu" title="Toggle sidebar"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg></button>
      <div class="headerSearch">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex:none"><circle cx="11" cy="11" r="7" stroke="var(--muted)" stroke-width="1.8"/><path d="m20 20-3.2-3.2" stroke="var(--muted)" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input placeholder="Search anything…"/>
        <span style="font-size:10.5px;font-weight:700;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:2px 6px;flex:none">⌘K</span>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
        <button class="iconBtn fsBtn" data-action="fs" title="Enter fullscreen"><svg id="fsIcon" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4m11-5v4a1 1 0 0 1-1 1h-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <div class="langWrap" style="position:relative">
          <button class="iconBtn langBtn" data-action="lang" title="Change language"><span id="langFlag" style="font-size:15px">🇺🇸</span><span id="langCode" style="font-size:12.5px;font-weight:700">EN</span><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <div id="langMenu"></div>
        </div>
        <button class="iconBtn" data-action="dark" title="Switch to dark mode"><svg id="darkIcon" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="iconBtn" title="Notifications" style="position:relative"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 0 1 12 0c0 6 2 7 2 7H4s2-1 2-7Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M10 20a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span style="position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--brand);border:1.5px solid var(--panel)"></span></button>
        <div class="profileChip">
          <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--primaryd));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:none">PM</div>
          <div class="profileText" style="line-height:1.15;min-width:0"><div style="font-size:13px;font-weight:700;white-space:nowrap">Prof. Mugisha</div><div style="font-size:10.5px;color:var(--muted);white-space:nowrap">Store Clerk</div></div>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="flex:none"><path d="m6 9 6 6 6-6" stroke="var(--muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
    </header>

    <div class="content">
      <!-- HEADER CARD -->
      <div class="card" style="padding:18px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">
        <div>
          <h1 style="margin:0;font-size:22px;font-weight:800;letter-spacing:-.5px">Category Management</h1>
          <p style="margin:5px 0 0;font-size:13px;color:var(--muted)">Manage your categories — works offline and syncs when online</p>
        </div>
        <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">
          <button class="btnImport" data-action="import-open" title="Import categories"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 15V3m0 12-4-4m4 4 4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Import</button>
          <div style="position:relative">
            <button class="btnExport" data-action="export-toggle" title="Export data"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Export<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <div id="exportMenu"></div>
          </div>
          <button class="btnAdd" data-action="add"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>Add Category</button>
        </div>
      </div>

      <!-- STATS -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(224px,1fr));gap:14px">
        <div class="card" style="padding:15px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px">
          <div style="display:flex;align-items:center;gap:13px;min-width:0">
            <div style="width:42px;height:42px;border-radius:9px;background:var(--orangesoft);color:var(--orange);display:flex;align-items:center;justify-content:center;flex:none"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg></div>
            <div><div style="font-size:12px;color:var(--muted);font-weight:600">Total</div><div id="stTotal" style="font-size:23px;font-weight:800;letter-spacing:-.5px">0</div></div>
          </div>
          <svg width="62" height="34" viewBox="0 0 62 34" fill="none" style="flex:none"><rect x="0" y="22" width="7" height="12" rx="2" fill="var(--orange)" opacity=".35"/><rect x="11" y="16" width="7" height="18" rx="2" fill="var(--orange)" opacity=".45"/><rect x="22" y="20" width="7" height="14" rx="2" fill="var(--orange)" opacity=".4"/><rect x="33" y="9" width="7" height="25" rx="2" fill="var(--orange)" opacity=".6"/><rect x="44" y="13" width="7" height="21" rx="2" fill="var(--orange)" opacity=".5"/><rect x="55" y="3" width="7" height="31" rx="2" fill="var(--orange)"/></svg>
        </div>
        <div class="card" style="padding:15px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px">
          <div style="display:flex;align-items:center;gap:13px;min-width:0">
            <div style="width:42px;height:42px;border-radius:9px;background:var(--greensoft);color:var(--green);display:flex;align-items:center;justify-content:center;flex:none"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="m5 12 5 5L20 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div><div style="font-size:12px;color:var(--muted);font-weight:600">Synced</div><div id="stSynced" style="font-size:23px;font-weight:800;letter-spacing:-.5px">0</div></div>
          </div>
          <svg width="62" height="34" viewBox="0 0 62 34" fill="none" style="flex:none"><path d="M1 25 13 19 25 22 37 11 49 13 61 4 61 34 1 34Z" fill="var(--green)" opacity=".13"/><path d="M1 25 13 19 25 22 37 11 49 13 61 4" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="card" style="padding:15px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px">
          <div style="display:flex;align-items:center;gap:13px;min-width:0">
            <div style="width:42px;height:42px;border-radius:9px;background:var(--ambersoft);color:var(--amber);display:flex;align-items:center;justify-content:center;flex:none"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 4v5h-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div><div style="font-size:12px;color:var(--muted);font-weight:600">Pending Sync</div><div id="stPending" style="font-size:23px;font-weight:800;letter-spacing:-.5px">0</div></div>
          </div>
          <svg width="62" height="34" viewBox="0 0 62 34" fill="none" style="flex:none"><rect x="0" y="26" width="7" height="8" rx="2" fill="var(--amber)" opacity=".4"/><rect x="11" y="24" width="7" height="10" rx="2" fill="var(--amber)" opacity=".45"/><rect x="22" y="27" width="7" height="7" rx="2" fill="var(--amber)" opacity=".4"/><rect x="33" y="25" width="7" height="9" rx="2" fill="var(--amber)" opacity=".5"/><rect x="44" y="28" width="7" height="6" rx="2" fill="var(--amber)" opacity=".4"/><rect x="55" y="26" width="7" height="8" rx="2" fill="var(--amber)" opacity=".55"/></svg>
        </div>
        <div class="card" style="padding:15px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px">
          <div style="display:flex;align-items:center;gap:13px;min-width:0">
            <div style="width:42px;height:42px;border-radius:9px;background:var(--primarysoft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex:none"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M2 8.5a16 16 0 0 1 20 0M5 12a11 11 0 0 1 14 0M8.5 15.5a6 6 0 0 1 7 0M12 19h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div><div style="font-size:12px;color:var(--muted);font-weight:600">Connection</div><div style="font-size:18px;font-weight:800;letter-spacing:-.3px">Online</div></div>
          </div>
          <svg width="62" height="34" viewBox="0 0 62 34" fill="none" style="flex:none"><path d="M1 20 13 18 25 19 37 17 49 18 61 16 61 34 1 34Z" fill="var(--primary)" opacity=".1"/><path d="M1 20 13 18 25 19 37 17 49 18 61 16" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- FILTER CARD -->
      <div class="card" style="padding:14px 16px;display:flex;align-items:center;gap:11px;flex-wrap:wrap">

  function doXLS(){ var rows=exportRows(); var t='<table border="1"><tr><th>#</th><th>Category</th><th>Description</th><th>Products</th><th>Status</th><th>Created</th></tr>'; rows.forEach(function(r,i){t+='<tr><td>'+(i+1)+'</td><td>'+r.name+'</td><td>'+r.desc+'</td><td>'+r.products+'</td><td>'+r.status+'</td><td>'+fmtDate(r.created)+'</td></tr>';}); t+='</table>'; download('categories.xls','<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body>'+t+'</body></html>','application/vnd.ms-excel'); state.exportOpen=false; render(); toast('Exported '+rows.length+' rows to Excel'); }

  // ---------- table card ----------

  function renderTable(){

  // ---------- actions ----------
  function openAdd(){ state.drawerOpen=true; state.drawerMode='add'; state.form={id:null,name:'',desc:'',status:'Active',color:PALETTE[Math.floor(Math.random()*PALETTE.length)]}; state.exportOpen=false; render(); }

  function saveDrawer(){ var F=state.form; if(!F.name.trim()){ toast('⚠ Enter a category name'); return; } if(state.drawerMode==='add'){ var id=Math.max.apply(null,[0].concat(state.categories.map(function(c){return c.id;})))+1; var today=new Date().toISOString().slice(0,10); state.categories.unshift({id:id,name:F.name.trim(),desc:F.desc.trim()||'—',products:0,status:F.status,created:today,color:F.color,synced:false}); state.page=1; state.drawerOpen=false; render(); toast('“'+F.name.trim()+'” added — pending sync'); } else { state.categories=state.categories.map(function(c){return c.id===F.id?Object.assign({},c,{name:F.name.trim(),desc:F.desc.trim()||'—',status:F.status,color:F.color,synced:false}):c;}); state.drawerOpen=false; render(); toast('Category updated'); } }

  function toggleAll(){ var rows=filtered(); var start=(state.page-1)*state.pageSize; var slice=rows.slice(start,start+state.pageSize); var ids=slice.map(function(r){return r.id;}); var all=slice.every(function(r){return state.selected.indexOf(r.id)>=0;}); if(all){ state.selected=state.selected.filter(function(x){return ids.indexOf(x)<0;}); } else { ids.forEach(function(id){ if(state.selected.indexOf(id)<0) state.selected.push(id); }); } render(); }

  // ---------- event delegation ----------
  document.addEventListener('click',function(e){
    var t=e.target.closest('[data-action],[data-nav],[data-view],[data-sort],[data-toggle],[data-edit],[data-del],[data-page],[data-lang],[data-swatch],[data-formstatus]');
    if(!t) return;
    var a=t.getAttribute('data-action');
    if(t.hasAttribute('data-nav')){ var idx=+t.getAttribute('data-nav'); if(!NAV[idx].active) toast(NAV[idx].label+' isn’t part of this prototype'); if(state.vw<880){ state.sidebarOpen=false; applyShell(); } return; }
    if(t.hasAttribute('data-view')){ state.view=t.getAttribute('data-view'); render(); return; }
    if(t.hasAttribute('data-sort')){ toggleSort(t.getAttribute('data-sort')); return; }
    if(t.hasAttribute('data-toggle')){ toggleSelect(+t.getAttribute('data-toggle')); return; }
    if(t.hasAttribute('data-edit')){ openEdit(+t.getAttribute('data-edit')); return; }
    if(t.hasAttribute('data-del')){ state.confirmOpen=true; state.confirmIds=[+t.getAttribute('data-del')]; state.confirmBulk=false; renderOverlays(); return; }
    if(t.hasAttribute('data-page')){ state.page=+t.getAttribute('data-page'); render(); return; }

    if(t.hasAttribute('data-swatch')){ state.form.color=t.getAttribute('data-swatch'); renderOverlays(); return; }
    if(t.hasAttribute('data-formstatus')){ state.form.status=t.getAttribute('data-formstatus'); renderOverlays(); return; }
    switch(a){
      case 'menu': if(state.vw<880){ state.sidebarOpen=!state.sidebarOpen; } else { state.collapsed=!state.collapsed; } applyShell(); break;

      case 'lang': state.langOpen=!state.langOpen; state.exportOpen=false; applyShell(); break;

      case 'dark': state.dark=!state.dark; applyShell(); break;

      case 'import-close': case 'import-backdrop': state.importOpen=false; renderOverlays(); break;

      case 'toggle-all': toggleAll(); break;
      case 'bulk-active': bulkStatus('Active'); break;

      case 'clear-filters': state.search=''; state.statusFilter='all'; state.fromDate=''; state.toDate=''; state.page=1; $('#searchInput').value=''; $('#statusFilter').value='all'; $('#fromDate').value=''; $('#toDate').value=''; render(); break;

      case 'next': var pages=Math.max(1,Math.ceil(filtered().length/state.pageSize)); state.page=Math.min(pages,state.page+1); render(); break;
      case 'pagesize': break;
      case 'drawer-close': case 'drawer-backdrop': state.drawerOpen=false; renderOverlays(); break;
      case 'drawer-save': saveDrawer(); break;
      case 'confirm-close': case 'confirm-backdrop': state.confirmOpen=false; renderOverlays(); break;
      case 'confirm-delete': confirmDelete(); break;
    }
  });

  // backdrop close
  $('#backdrop').addEventListener('click',function(){ state.sidebarOpen=false; applyShell(); });

  // input / change handlers
  document.addEventListener('input',function(e){
    var id=e.target.id;
    if(id==='searchInput'){ state.search=e.target.value; state.page=1; renderTable(); }
    else if(id==='formName'){ state.form.name=e.target.value; var av=$('#formAvatar'); if(av) av.textContent=(e.target.value||'?').charAt(0).toUpperCase(); }
    else if(id==='formDesc'){ state.form.desc=e.target.value; }
  });
  document.addEventListener('change',function(e){
    var id=e.target.id;
    if(id==='statusFilter'){ state.statusFilter=e.target.value; state.page=1; renderTable(); }
    else if(id==='fromDate'){ state.fromDate=e.target.value; state.page=1; renderTable(); }
    else if(id==='toDate'){ state.toDate=e.target.value; state.page=1; renderTable(); }
    else if(e.target.getAttribute('data-action')==='pagesize'){ state.pageSize=parseInt(e.target.value,10); state.page=1; renderTable(); }
  });

  document.addEventListener('fullscreenchange',function(){ state.fullscreen=!!document.fullscreenElement; applyShell(); });
  window.addEventListener('resize',function(){ state.vw=window.innerWidth; render(); });

  render();
})();
</script>
</body>
</html>
